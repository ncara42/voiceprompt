name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev

      - name: Sync
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/

      - name: Import smoke test
        run: |
          uv run python -c "from voiceprompt import cli, menu, config, recorder, claude, transcriber, viz, hotkey, inject, select, clipboard, styles; print('imports OK')"

      - name: CLI smoke test
        run: uv run voiceprompt --version
