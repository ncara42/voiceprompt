name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev

      - name: Sync
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type-check (gradual)
        run: uv run mypy

      - name: Run tests
        run: uv run python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Import smoke test
        run: |
          uv run python -c "from voiceprompt import cli, config, history, reformulator; from voiceprompt.audio import recorder, transcriber; from voiceprompt.providers import claude, gemini, ollama, github_models; from voiceprompt.system import hotkey, inject, clipboard, proctitle; from voiceprompt.ui import menu, viz, styles, select; print('imports OK')"

      - name: CLI smoke test
        run: uv run voiceprompt --version
